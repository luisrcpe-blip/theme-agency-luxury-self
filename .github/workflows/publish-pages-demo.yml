name: Publish demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - name: Build verified release
        env:
          THEME_SOURCE_COMMIT: ${{ github.sha }}
          THEME_SOURCE_BRANCH: ${{ github.ref_name }}
        run: npm run release
      - name: Prepare Pages artifact
        env:
          THEME_DEMO_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: npm run prepare:demo
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo-out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
